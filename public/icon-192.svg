<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="#0f172a"/>
  
  <!-- Outer Glow / Ring -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#0891b2" stroke-width="8" opacity="0.3"/>
  <circle cx="256" cy="256" r="160" fill="none" stroke="#22d3ee" stroke-width="4" stroke-dasharray="16 12" opacity="0.6"/>

  <!-- Shield Shape -->
  <path d="M256,90 C320,90 380,120 380,180 C380,290 290,370 256,410 C222,370 132,290 132,180 C132,120 192,90 256,90 Z" 
        fill="url(#shieldGrad)" 
        stroke="#22d3ee" 
        stroke-width="12" 
        stroke-linejoin="round"/>

  <!-- Inner Shimmer Accent -->
  <path d="M256,110 C290,110 350,130 350,180 C350,260 290,330 256,375 L256,110 Z" 
        fill="#ffffff" 
        opacity="0.08"/>

  <!-- Security Pulse / Concentric lines -->
  <path d="M256,160 C290,160 310,180 310,210 C310,260 256,310 256,310 C256,310 202,260 202,210 C202,180 222,160 256,160 Z" 
        fill="none" 
        stroke="#06b6d4" 
        stroke-width="4" 
        stroke-dasharray="6 4"/>

  <!-- Glowing Eye / Radar Center Motif -->
  <!-- Outer Eye contour -->
  <path d="M190,230 C210,200 240,195 256,195 C272,195 302,200 322,230 C302,260 272,265 256,265 C240,265 210,260 190,230 Z" 
        fill="none" 
        stroke="#ffffff" 
        stroke-width="8" 
        stroke-linecap="round"/>
        
  <!-- Pupil -->
  <circle cx="256" cy="230" r="18" fill="#22d3ee"/>
  <circle cx="261" cy="225" r="5" fill="#ffffff"/>

  <!-- Gradients -->
  <defs>
    <linearGradient id="shieldGrad" x1="256" y1="90" x2="256" y2="410" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
  </defs>
</svg>
